apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: boutique
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore

  target:
    name:  db-secret
    creationPolicy: Owner

  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: prod/database/credentials
        property: POSTGRES_DB

    - secretKey: POSTGRES_USER
      remoteRef:
        key: prod/database/credentials
        property: POSTGRES_USER

    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: prod/database/credentials
        property: POSTGRES_PASSWORD

    - secretKey: AUTH_DB_URL
      remoteRef:
        key: prod/database/credentials
        property: AUTH_DB_URL

    - secretKey: PRODUCTS_DB_URL
      remoteRef:
        key: prod/database/credentials
        property: PRODUCTS_DB_URL

    - secretKey: ORDERS_DB_URL
      remoteRef:
        key: prod/database/credentials
        property: ORDERS_DB_URL

    - secretKey: USERS_DB_URL
      remoteRef:
        key: prod/database/credentials
        property: USERS_DB_URL
